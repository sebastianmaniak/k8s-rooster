name: f5vip-terraform

on:
  push:
    branches: [main]
    paths:
      - "f5vip/**"
      - ".github/workflows/f5vip-terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (otherwise just fmt/validate)?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: f5vip-terraform
  cancel-in-progress: false

jobs:
  fmt_validate:
    name: fmt + validate (no device access)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: f5vip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  apply:
    name: apply (self-hosted runner required)
    needs: fmt_validate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply == 'true')
    runs-on: [self-hosted]
    defaults:
      run:
        working-directory: f5vip
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      # Terraform variables (set these as GitHub repo/environment secrets)
      TF_VAR_bigip_address: ${{ secrets.BIGIP_ADDRESS }}
      TF_VAR_bigip_username: ${{ secrets.BIGIP_USERNAME }}
      TF_VAR_bigip_password: ${{ secrets.BIGIP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare local state directory
        run: |
          mkdir -p "$HOME/.terraform-state/k8s-rooster/f5vip"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -state="$HOME/.terraform-state/k8s-rooster/f5vip/terraform.tfstate"
