---
# Proxmox LXC Containers — Bank Compliance Portal
# IPs assigned via DHCP on 172.16.10.x network
# After provisioning, update IPs from: pvesh get /cluster/resources --type vm

all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    # Proxmox API connection
    proxmox_host: "172.16.10.15"
    proxmox_user: "root@pam"
    proxmox_node: "rooster"
    proxmox_storage: "local-lvm"
    proxmox_bridge: "vmbr0"
    proxmox_template: "local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst"

  children:
    webservers:
      hosts:
        compliance-web:
          ansible_host: "{{ compliance_web_ip | default('pending-dhcp') }}"
          lxc_vmid: 200
          lxc_memory: 64
          lxc_swap: 64
          lxc_disk: "1"
          lxc_cores: 1
          lxc_description: "Nginx reverse proxy — Compliance Portal frontend"

    appservers:
      hosts:
        compliance-app:
          ansible_host: "{{ compliance_app_ip | default('pending-dhcp') }}"
          lxc_vmid: 201
          lxc_memory: 128
          lxc_swap: 128
          lxc_disk: "2"
          lxc_cores: 1
          lxc_description: "Flask API — Compliance Portal backend"

    dbservers:
      hosts:
        compliance-db:
          ansible_host: "{{ compliance_db_ip | default('pending-dhcp') }}"
          lxc_vmid: 202
          lxc_memory: 128
          lxc_swap: 128
          lxc_disk: "2"
          lxc_cores: 1
          lxc_description: "PostgreSQL — Compliance Portal database"

    proxmox:
      hosts:
        pve:
          ansible_host: "172.16.10.15"
          ansible_user: root
