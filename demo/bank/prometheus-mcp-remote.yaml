# RemoteMCPServer CR — registers Prometheus MCP as a tool server for kagent agents
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: prometheus-mcp
  namespace: kagent
spec:
  description: Prometheus MCP Server — PromQL queries for cluster metrics, capacity planning, and resource usage analysis
  url: http://prometheus-mcp-server.kagent.svc.cluster.local:9090/sse
  protocol: SSE
  timeout: 30s
  terminateOnClose: true
