# Minimal Prometheus + kube-state-metrics for the demo
# Uses prometheus-community helm chart via ArgoCD
# Only needed if Prometheus is not already on the cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-demo
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 72.3.0
    helm:
      valuesObject:
        # Minimal install — just Prometheus + kube-state-metrics, no Grafana (we already have it)
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        kube-state-metrics:
          enabled: true
        nodeExporter:
          enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
