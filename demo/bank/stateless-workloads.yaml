# Scenario 2: Migration candidates — stateless workloads for kagent to identify
# risk-api and compliance-batch are stateless (no PVCs).
# market-data-store is stateful (has PVC) — kagent should flag it as NOT a candidate.

# --- risk-management namespace ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-api
  namespace: risk-management
  labels:
    app: risk-api
    tier: api
    team: risk
spec:
  replicas: 3
  selector:
    matchLabels:
      app: risk-api
  template:
    metadata:
      labels:
        app: risk-api
        istio.io/inject: "enabled"
    spec:
      containers:
      - name: risk-api
        image: nginx:1.25-alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: SERVICE_NAME
          value: "risk-api"
        - name: LOG_LEVEL
          value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: risk-api
  namespace: risk-management
  labels:
    app: risk-api
spec:
  selector:
    app: risk-api
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
# Stateful workload — NOT a migration candidate
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: market-data-pvc
  namespace: risk-management
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-store
  namespace: risk-management
  labels:
    app: market-data-store
    tier: data
    team: risk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data-store
  template:
    metadata:
      labels:
        app: market-data-store
    spec:
      containers:
      - name: market-data-store
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: market-data-pvc
---
# --- compliance-ops namespace ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-batch
  namespace: compliance-ops
  labels:
    app: compliance-batch
    tier: batch
    team: compliance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliance-batch
  template:
    metadata:
      labels:
        app: compliance-batch
    spec:
      containers:
      - name: compliance-batch
        image: nginx:1.25-alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        env:
        - name: SERVICE_NAME
          value: "compliance-batch"
        - name: BATCH_SCHEDULE
          value: "*/15 * * * *"
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-batch
  namespace: compliance-ops
  labels:
    app: compliance-batch
spec:
  selector:
    app: compliance-batch
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: compliance-config
  namespace: compliance-ops
data:
  config.yaml: |
    reporting:
      schedule: "*/15 * * * *"
      output: s3://compliance-reports
    rules_engine:
      version: "2.4.1"
      regulatory_framework: "PRA-2026"
