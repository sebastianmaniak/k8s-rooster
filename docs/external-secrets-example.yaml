# External Secrets Operator with HashiCorp Vault (IMPLEMENTED)
#
# This is now live in the cluster. See vault/ directory for actual resources.
#
# Architecture:
#   HashiCorp Vault (vault namespace)
#     └── ClusterSecretStore (vault-backend)
#           ├── ExternalSecret → openai-secret     (agentgateway-system)
#           ├── ExternalSecret → anthropic-secret   (agentgateway-system)
#           ├── ExternalSecret → xai-secret         (agentgateway-system)
#           ├── ExternalSecret → kagent-openai      (kagent)
#           ├── ExternalSecret → anthropic-api-keys (kagent)
#           └── ExternalSecret → kagent-xai-provider(kagent)
#
# Vault paths:
#   secret/data/f5/bigip  — host, username, password
#   secret/data/llm       — anthropic-api-key, openai-api-key, xai-api-key
#
# Setup: ./scripts/vault-init.sh
# Vault UI: http://vault.rooster.maniak.com:8200 (F5 VIP 172.16.20.126)
