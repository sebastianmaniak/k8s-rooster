# Bank compliance prompt enrichment — injected into every LLM call through bank gateway
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: bank-compliance-enrichment
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bank-openai
  backend:
    ai:
      prompt:
        prepend:
        - role: system
          content: |
            BANKING COMPLIANCE RULES (mandatory):
            1. Never disclose customer PII (SSN, full account numbers) in responses
            2. All credit decisions must follow Equal Credit Opportunity Act (ECOA)
            3. Credit limit increases >2x current limit require manual admin approval
            4. Customers with delinquencies must be routed to manual review
            5. Always provide clear reasoning for credit decisions
            6. Log all credit limit changes with assessed_by field for audit
---
# PII protection on bank LLM route
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: bank-pii-guard
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bank-openai
  backend:
    ai:
      promptGuard:
        request:
        - response:
            message: "BLOCKED: Request contains sensitive financial data"
            statusCode: 403
          regex:
            action: Reject
            builtins:
            - CreditCard
        - response:
            message: "BLOCKED: Request contains a Social Security Number"
            statusCode: 403
          regex:
            action: Reject
            builtins:
            - Ssn
        response:
        - regex:
            builtins:
            - CreditCard
            action: Mask
        - regex:
            builtins:
            - Ssn
            action: Mask
