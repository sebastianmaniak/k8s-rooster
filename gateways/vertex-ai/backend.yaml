apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: vertex-ai
  namespace: agentgateway-system
spec:
  ai:
    provider:
      vertexai:
        projectId: "marketing-441114"
        region: "us-central1"

        # Pick a Vertex model you have access to (examples):
        # - gemini-2.0-flash
        # - gemini-2.0-pro
        # Vertex Model Garden expects <publisher>/<model>
        model: anthropic/claude-opus-4-6

  # Auth NOTE:
  # - Vertex AI backends use GCP Application Default Credentials (ADC).
  # - On this on-prem cluster, mount a service account JSON key as a K8s Secret and set
  #   GOOGLE_APPLICATION_CREDENTIALS in the agentgateway proxy pods.
