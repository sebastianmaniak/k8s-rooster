apiVersion: v1
kind: ServiceAccount
metadata:
  name: khook-auth-proxy
  namespace: kagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khook-auth-proxy
  namespace: kagent
  labels:
    app: khook-auth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: khook-auth-proxy
  template:
    metadata:
      labels:
        app: khook-auth-proxy
    spec:
      serviceAccountName: khook-auth-proxy
      containers:
      - name: proxy
        image: python:3.12-slim
        command: ["python3", "/app/proxy.py"]
        ports:
        - name: proxy
          containerPort: 8083
        - name: health
          containerPort: 8084
        env:
        - name: UPSTREAM_URL
          value: "http://kagent-controller.kagent.svc.cluster.local:8083"
        - name: USER_ID
          value: "admin"
        - name: SA_TOKEN_PATH
          value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        volumeMounts:
        - name: script
          mountPath: /app
          readOnly: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8084
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 15
      volumes:
      - name: script
        configMap:
          name: khook-auth-proxy-script
---
apiVersion: v1
kind: Service
metadata:
  name: khook-auth-proxy
  namespace: kagent
  labels:
    app: khook-auth-proxy
spec:
  selector:
    app: khook-auth-proxy
  ports:
  - port: 8083
    targetPort: 8083
    protocol: TCP
    name: proxy
