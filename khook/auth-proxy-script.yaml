apiVersion: v1
kind: ConfigMap
metadata:
  name: khook-auth-proxy-script
  namespace: kagent
data:
  proxy.py: |
    #!/usr/bin/env python3
    """
    khook-auth-proxy: Authenticating reverse proxy for khook -> kagent-enterprise.

    Sits between khook and kagent-controller. Obtains OIDC tokens via
    client_credentials or password grant and injects Authorization + X-User-ID
    headers before forwarding requests upstream.

    Environment variables:
      UPSTREAM_URL     - kagent-controller URL (default: http://kagent-controller.kagent.svc.cluster.local:8083)
      IDP_TOKEN_URL    - OIDC token endpoint (direct URL, takes precedence over IDP_ISSUER)
      IDP_ISSUER       - OIDC issuer URL (used for .well-known discovery if IDP_TOKEN_URL not set)
      CLIENT_ID        - OIDC client ID (default: kagent-enterprise)
      CLIENT_SECRET    - OIDC client secret
      GRANT_TYPE       - OAuth2 grant type: client_credentials or password (default: client_credentials)
      IDP_USERNAME     - Username for password grant (default: admin)
      IDP_PASSWORD     - Password for password grant
      USER_ID          - X-User-ID header value (default: admin@kagent.dev)
      LISTEN_PORT      - Proxy listen port (default: 8083)
      SCOPE            - OAuth2 scope (default: openid email profile)
    """

    from http.server import HTTPServer, BaseHTTPRequestHandler
    import urllib.request
    import urllib.parse
    import urllib.error
    import json
    import time
    import os
    import ssl
    import threading
    import sys

    # --- Configuration ---
    UPSTREAM_URL = os.environ.get("UPSTREAM_URL", "http://kagent-controller.kagent.svc.cluster.local:8083")
    IDP_TOKEN_URL = os.environ.get("IDP_TOKEN_URL", "")
    IDP_ISSUER = os.environ.get("IDP_ISSUER", "")
    CLIENT_ID = os.environ.get("CLIENT_ID", "kagent-enterprise")
    CLIENT_SECRET = os.environ.get("CLIENT_SECRET", "")
    GRANT_TYPE = os.environ.get("GRANT_TYPE", "client_credentials")
    IDP_USERNAME = os.environ.get("IDP_USERNAME", "admin")
    IDP_PASSWORD = os.environ.get("IDP_PASSWORD", "")
    USER_ID = os.environ.get("USER_ID", "admin@kagent.dev")
    LISTEN_PORT = int(os.environ.get("LISTEN_PORT", "8083"))
    SCOPE = os.environ.get("SCOPE", "openid email profile")

    # --- TLS context (skip verify for internal services) ---
    TLS_CTX = ssl.create_default_context()
    TLS_CTX.check_hostname = False
    TLS_CTX.verify_mode = ssl.CERT_NONE

    # --- Token cache ---
    _lock = threading.Lock()
    _cache = {"token": None, "expires_at": 0}
    _token_url_cache = {"url": None}


    def log(msg):
        print(f"[khook-auth-proxy] {msg}", flush=True)


    def discover_token_endpoint():
        """Discover token endpoint from OIDC issuer via .well-known."""
        if _token_url_cache["url"]:
            return _token_url_cache["url"]

        if IDP_TOKEN_URL:
            _token_url_cache["url"] = IDP_TOKEN_URL
            return IDP_TOKEN_URL

        if not IDP_ISSUER:
            raise ValueError("Either IDP_TOKEN_URL or IDP_ISSUER must be set")

        discovery = f"{IDP_ISSUER.rstrip('/')}/.well-known/openid-configuration"
        log(f"Discovering token endpoint from {discovery}")
        req = urllib.request.Request(discovery)
        resp = urllib.request.urlopen(req, context=TLS_CTX, timeout=10)
        config = json.loads(resp.read())
        url = config["token_endpoint"]
        _token_url_cache["url"] = url
        log(f"Token endpoint: {url}")
        return url


    def fetch_token():
        """Obtain a fresh access token from the IDP."""
        token_url = discover_token_endpoint()

        params = {
            "grant_type": GRANT_TYPE,
            "client_id": CLIENT_ID,
            "scope": SCOPE,
        }
        if CLIENT_SECRET:
            params["client_secret"] = CLIENT_SECRET
        if GRANT_TYPE == "password":
            params["username"] = IDP_USERNAME
            params["password"] = IDP_PASSWORD

        data = urllib.parse.urlencode(params).encode()
        req = urllib.request.Request(token_url, data=data, headers={
            "Content-Type": "application/x-www-form-urlencoded",
        })

        resp = urllib.request.urlopen(req, context=TLS_CTX, timeout=15)
        result = json.loads(resp.read())

        if "access_token" not in result:
            raise RuntimeError(f"Token response missing access_token: {result}")

        expires_in = result.get("expires_in", 3600)
        log(f"Token obtained, expires in {expires_in}s")
        return result["access_token"], time.time() + expires_in


    def get_token():
        """Get a valid token, refreshing if expired or about to expire."""
        with _lock:
            now = time.time()
            if _cache["token"] and _cache["expires_at"] > now + 60:
                return _cache["token"]
            token, expires_at = fetch_token()
            _cache["token"] = token
            _cache["expires_at"] = expires_at
            return token


    class ProxyHandler(BaseHTTPRequestHandler):
        """Reverse proxy that injects OIDC auth into upstream requests."""

        def _proxy(self):
            # Read request body
            content_length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(content_length) if content_length > 0 else None

            # Obtain auth token
            try:
                token = get_token()
            except Exception as e:
                log(f"ERROR obtaining token: {e}")
                self.send_error(502, f"Auth proxy failed to obtain token: {e}")
                return

            # Build upstream URL
            upstream = f"{UPSTREAM_URL}{self.path}"

            # Forward headers, inject auth
            headers = {}
            for key in self.headers:
                lower = key.lower()
                if lower not in ("host", "authorization", "x-user-id", "transfer-encoding"):
                    headers[key] = self.headers[key]
            headers["Authorization"] = f"Bearer {token}"
            headers["X-User-ID"] = USER_ID

            # Proxy the request
            try:
                req = urllib.request.Request(
                    upstream, data=body, headers=headers, method=self.command
                )
                resp = urllib.request.urlopen(req, context=TLS_CTX, timeout=600)

                # Send response status + headers
                self.send_response(resp.status)
                for key, val in resp.headers.items():
                    if key.lower() not in ("transfer-encoding", "connection"):
                        self.send_header(key, val)
                self.end_headers()

                # Stream response body in chunks
                while True:
                    chunk = resp.read(8192)
                    if not chunk:
                        break
                    self.wfile.write(chunk)
                    self.wfile.flush()

            except urllib.error.HTTPError as e:
                log(f"Upstream returned {e.code} for {self.command} {self.path}")
                self.send_response(e.code)
                for key, val in e.headers.items():
                    if key.lower() not in ("transfer-encoding", "connection"):
                        self.send_header(key, val)
                self.end_headers()
                err_body = e.read()
                if err_body:
                    self.wfile.write(err_body)
            except Exception as e:
                log(f"ERROR proxying {self.command} {self.path}: {e}")
                self.send_error(502, f"Upstream error: {e}")

        # Route all methods through the proxy
        do_GET = _proxy
        do_POST = _proxy
        do_PUT = _proxy
        do_PATCH = _proxy
        do_DELETE = _proxy
        do_OPTIONS = _proxy

        def log_message(self, fmt, *args):
            log(f"{self.address_string()} {fmt % args}")


    class HealthHandler(BaseHTTPRequestHandler):
        """Simple health check server on a separate port."""

        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
            else:
                self.send_error(404)

        def log_message(self, fmt, *args):
            pass  # Silence health check logs


    def main():
        log(f"Starting on :{LISTEN_PORT}")
        log(f"Upstream: {UPSTREAM_URL}")
        log(f"Grant type: {GRANT_TYPE}")
        log(f"Client ID: {CLIENT_ID}")
        log(f"User ID: {USER_ID}")

        if not IDP_TOKEN_URL and not IDP_ISSUER:
            log("WARNING: Neither IDP_TOKEN_URL nor IDP_ISSUER is set!")
            log("Set one of these to enable token acquisition.")

        # Pre-warm token cache
        try:
            get_token()
            log("Token pre-warm successful")
        except Exception as e:
            log(f"WARNING: Token pre-warm failed: {e} (will retry on first request)")

        # Start health check server on port 8084
        health_server = HTTPServer(("0.0.0.0", 8084), HealthHandler)
        health_thread = threading.Thread(target=health_server.serve_forever, daemon=True)
        health_thread.start()
        log("Health server on :8084/healthz")

        # Start proxy server
        proxy_server = HTTPServer(("0.0.0.0", LISTEN_PORT), ProxyHandler)
        log(f"Proxy ready, forwarding to {UPSTREAM_URL}")
        proxy_server.serve_forever()


    if __name__ == "__main__":
        main()
