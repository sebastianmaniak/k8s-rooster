apiVersion: v1
kind: ConfigMap
metadata:
  name: khook-auth-proxy-script
  namespace: kagent
data:
  proxy.py: |
    #!/usr/bin/env python3
    """
    khook-auth-proxy: Injects K8s SA token + X-User-Id into requests
    from khook before forwarding to kagent-controller.

    kagent-enterprise accepts K8s ServiceAccount tokens for authentication
    when paired with an X-User-Id header for identity. This proxy reads
    the pod's mounted SA token and injects both headers automatically.

    Environment variables:
      UPSTREAM_URL  - kagent-controller URL (default: http://kagent-controller.kagent.svc.cluster.local:8083)
      USER_ID       - X-User-Id header value (default: admin)
      LISTEN_PORT   - Proxy listen port (default: 8083)
      SA_TOKEN_PATH - Path to SA token file (default: /var/run/secrets/kubernetes.io/serviceaccount/token)
    """

    from http.server import HTTPServer, BaseHTTPRequestHandler
    import urllib.request
    import urllib.error
    import os
    import threading
    import time

    UPSTREAM_URL = os.environ.get("UPSTREAM_URL", "http://kagent-controller.kagent.svc.cluster.local:8083")
    USER_ID = os.environ.get("USER_ID", "admin")
    LISTEN_PORT = int(os.environ.get("LISTEN_PORT", "8083"))
    SA_TOKEN_PATH = os.environ.get("SA_TOKEN_PATH", "/var/run/secrets/kubernetes.io/serviceaccount/token")

    _lock = threading.Lock()
    _token_cache = {"token": None, "mtime": 0}


    def log(msg):
        print(f"[khook-auth-proxy] {msg}", flush=True)


    def get_sa_token():
        """Read the SA token from the mounted file, with caching."""
        with _lock:
            try:
                mtime = os.path.getmtime(SA_TOKEN_PATH)
            except OSError:
                mtime = 0

            if _token_cache["token"] and _token_cache["mtime"] == mtime:
                return _token_cache["token"]

            try:
                with open(SA_TOKEN_PATH) as f:
                    token = f.read().strip()
                _token_cache["token"] = token
                _token_cache["mtime"] = mtime
                return token
            except FileNotFoundError:
                log(f"WARNING: SA token not found at {SA_TOKEN_PATH}")
                return ""


    class ProxyHandler(BaseHTTPRequestHandler):
        """Reverse proxy that injects SA token + X-User-Id headers."""

        def _proxy(self):
            content_length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(content_length) if content_length > 0 else None

            upstream = f"{UPSTREAM_URL}{self.path}"
            token = get_sa_token()

            headers = {}
            for key in self.headers:
                if key.lower() not in ("host", "authorization", "x-user-id", "transfer-encoding"):
                    headers[key] = self.headers[key]

            if token:
                headers["Authorization"] = f"Bearer {token}"
            headers["X-User-Id"] = USER_ID

            try:
                req = urllib.request.Request(
                    upstream, data=body, headers=headers, method=self.command
                )
                resp = urllib.request.urlopen(req, timeout=600)

                self.send_response(resp.status)
                for key, val in resp.headers.items():
                    if key.lower() not in ("transfer-encoding", "connection"):
                        self.send_header(key, val)
                self.end_headers()

                while True:
                    chunk = resp.read(8192)
                    if not chunk:
                        break
                    self.wfile.write(chunk)
                    self.wfile.flush()

            except urllib.error.HTTPError as e:
                self.send_response(e.code)
                for key, val in e.headers.items():
                    if key.lower() not in ("transfer-encoding", "connection"):
                        self.send_header(key, val)
                self.end_headers()
                err_body = e.read()
                if err_body:
                    self.wfile.write(err_body)
            except Exception as e:
                log(f"ERROR proxying {self.command} {self.path}: {e}")
                self.send_error(502, f"Upstream error: {e}")

        do_GET = _proxy
        do_POST = _proxy
        do_PUT = _proxy
        do_PATCH = _proxy
        do_DELETE = _proxy
        do_OPTIONS = _proxy

        def log_message(self, fmt, *args):
            log(f"{self.address_string()} {fmt % args}")


    class HealthHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
            else:
                self.send_error(404)

        def log_message(self, fmt, *args):
            pass


    def main():
        log(f"Starting on :{LISTEN_PORT}")
        log(f"Upstream: {UPSTREAM_URL}")
        log(f"User ID: {USER_ID}")
        log(f"SA token path: {SA_TOKEN_PATH}")

        token = get_sa_token()
        if token:
            log(f"SA token loaded ({len(token)} bytes)")
        else:
            log("WARNING: No SA token available")

        health = HTTPServer(("0.0.0.0", 8084), HealthHandler)
        threading.Thread(target=health.serve_forever, daemon=True).start()
        log("Health server on :8084/healthz")

        server = HTTPServer(("0.0.0.0", LISTEN_PORT), ProxyHandler)
        log("Proxy ready")
        server.serve_forever()


    if __name__ == "__main__":
        main()
