# ExternalSecret to pull OIDC credentials from Vault for the auth proxy.
#
# Vault path: secret/khook-auth-proxy
# Expected keys:
#   - client-secret  (OIDC backend client secret)
#   - idp-password   (auto IDP admin password, optional)
#
# If using the auto IDP, only idp-password is needed.
# If using production OIDC (Okta/Keycloak), only client-secret is needed.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: khook-auth-proxy-oidc
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: khook-auth-proxy-oidc
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: khook-auth-proxy
        property: client-secret
    - secretKey: idp-password
      remoteRef:
        key: khook-auth-proxy
        property: idp-password
