# Allow all bank MCP tools by default (auth handled at gateway level)
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: bank-mcp-policy
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bank-mcp
  backend:
    mcp:
      toolAuth:
        defaultAction: Allow
