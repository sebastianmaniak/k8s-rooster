apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bank-mcp
  namespace: agentgateway-system
  labels:
    route-type: bank-mcp
spec:
  parentRefs:
  - name: bank-gateway-proxy
    namespace: agentgateway-system
    sectionName: bank-providers
    group: gateway.networking.k8s.io
    kind: Gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mcp/bank
    backendRefs:
    - name: bank-mcp-backend
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend
