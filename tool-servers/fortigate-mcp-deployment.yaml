apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortigate-mcp-server
  namespace: kagent
  labels:
    app: fortigate-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortigate-mcp-server
  template:
    metadata:
      labels:
        app: fortigate-mcp-server
    spec:
      containers:
      - name: fortigate-mcp
        image: sebbycorp/fortigate-mcp-server:latest
        ports:
        - containerPort: 8080
        env:
        - name: FORTI_HOST
          valueFrom:
            secretKeyRef:
              name: fortigate-credentials
              key: host
        - name: FORTI_TOKEN
          valueFrom:
            secretKeyRef:
              name: fortigate-credentials
              key: forti_token
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fortigate-mcp-server
  namespace: kagent
  labels:
    app: fortigate-mcp-server
spec:
  selector:
    app: fortigate-mcp-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fortigate-mcp-server-egress
  namespace: kagent
spec:
  podSelector:
    matchLabels:
      app: fortigate-mcp-server
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.0.0.0/8
    ports:
    - port: 443
      protocol: TCP
