apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: moat-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/component: remote-mcp
    app.kubernetes.io/name: kagent-tool-servers
spec:
  description: >-
    Moat sandbox pool manager — create isolated Linux sandboxes with fleet-wide
    orchestration, execute code, manage files, port forwarding, snapshots, and
    container image support across a distributed pool of hosts
  protocol: STREAMABLE_HTTP
  terminateOnClose: true
  timeout: 120s
  url: http://172.16.10.173:8000/mcp
