apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-mcp-server
  namespace: kagent
  labels:
    app: vault-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-mcp-server
  template:
    metadata:
      labels:
        app: vault-mcp-server
    spec:
      containers:
      - name: vault-mcp
        image: sebbycorp/vault-mcp-server:latest
        command: ["./vault-mcp-server", "streamable-http", "--transport-host", "0.0.0.0"]
        ports:
        - containerPort: 8080
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-mcp-credentials
              key: VAULT_TOKEN
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: vault-mcp-server
  namespace: kagent
  labels:
    app: vault-mcp-server
spec:
  selector:
    app: vault-mcp-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
