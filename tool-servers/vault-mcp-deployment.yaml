apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-mcp-server
  namespace: kagent
  labels:
    app: vault-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-mcp-server
  template:
    metadata:
      labels:
        app: vault-mcp-server
    spec:
      serviceAccountName: vault-mcp-server
      containers:
      - name: vault-mcp
        image: docker.io/sebbycorp/vault-mcp-server:latest
        command: ["./vault-mcp-server", "http"]
        ports:
        - containerPort: 8080
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-mcp-credentials
              key: VAULT_TOKEN
        - name: TRANSPORT_HOST
          value: "0.0.0.0"
        - name: TRANSPORT_PORT
          value: "8080"
        - name: MCP_CORS_MODE
          value: "disabled"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-mcp-server
  namespace: kagent
---
apiVersion: v1
kind: Service
metadata:
  name: vault-mcp-server
  namespace: kagent
  labels:
    app: vault-mcp-server
spec:
  selector:
    app: vault-mcp-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
