# ExternalSecrets for agentgateway-system namespace
# Syncs LLM provider API keys from HashiCorp Vault → K8s Secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-secret
  namespace: agentgateway-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openai-secret
    creationPolicy: Owner
  data:
    - secretKey: Authorization
      remoteRef:
        key: llm
        property: openai-api-key
